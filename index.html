<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Án Cuối Khóa - Giao Diện Đáp Ứng Hỗ Trợ Tiếp Cận</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Bộ Sưu Tập Công Nghệ Đột Phá</h1>
        <p>Giao diện responsive, thân thiện với mọi người dùng</p>
    </header>

    <main class="grid-container">
        <figure class="card">
            <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?auto=format&fit=crop&w=800&q=80" alt="Một kỹ sư phần mềm đang tập trung lập trình web trên máy tính xách tay với các dòng code nhiều màu sắc">
            <figcaption>
                <h2>Phát Triển Web Hiện Đại</h2>
                <p>Khám phá thế giới mã nguồn mở và học cách xây dựng các giao diện người dùng tương tác, mượt mà với tiêu chuẩn HTML5 và CSS3 mới nhất.</p>
            </figcaption>
        </figure>

        <figure class="card">
            <img src="https://images.unsplash.com/photo-1551650975-87deedd944c3?auto=format&fit=crop&w=800&q=80" alt="Một chiếc điện thoại thông minh hiện đại đang hiển thị giao diện ứng dụng di động gọn gàng">
            <figcaption>
                <h2>Chiến Lược Mobile-First</h2>
                <p>Thiết kế ưu tiên thiết bị di động giúp tối ưu hóa hiệu năng, tiết kiệm băng thông và mang lại trải nghiệm mượt mà nhất cho người dùng cuối.</p>
            </figcaption>
        </figure>

        <figure class="card">
            <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=800&q=80" alt="Hệ thống tủ rack máy chủ đám mây với các đèn tín hiệu xanh nhấp nháy liên tục trong phòng dữ liệu">
            <figcaption>
                <h2>Hạ Tầng Điện Toán Đám Mây</h2>
                <p>Học cách vận hành và triển khai các ứng dụng web lên nền tảng đám mây mạnh mẽ, đảm bảo tính sẵn sàng cao và khả năng bảo mật tối đa.</p>
            </figcaption>
        </figure>
    </main>

    <footer>
        <p>&copy; 2026 Dự án hoàn thành bởi Học Viên Khóa Học Responsive Web Design.</p>
    </footer>

</body>
</html>
